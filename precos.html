<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Preços</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-marrom py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold fs-4" href="index.html">JKR</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-lg-center" id="menu">
          <ul class="navbar-nav mx-auto gap-4 fw-medium text-center mt-3 mt-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="precos.html">Preços</a></li>
            <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
            <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
          </ul>
        </div>

        <div class="navbar-brand fw-bold fs-4">
          <a class="nav-link" href="carrinho.html"><i class="bi bi-cart"></i></a>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5 text-center flex-grow-1">
    <div class="mb-4 mx-auto" style="max-width: 300px;">
      <label for="seletorTamanho" class="form-label fw-bold">Simular Preço por Tamanho:</label>
      <select id="seletorTamanho" class="form-select">
        <option value="todos">Mostrar Todos</option>
        <option value="P">Apenas Tamanho P</option>
        <option value="M">Apenas Tamanho M</option>
        <option value="G">Apenas Tamanho G</option>
      </select>
    </div>

    <table class="table table-bordered mt-4" id="tabelaPrecos">
      <thead class="table-dark">
        <tr>
          <th>Modelo</th>
          <th class="col-p">P</th>
          <th class="col-m">M</th>
          <th class="col-g">G</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Física</td>
          <td class="col-p">R$49</td>
          <td class="col-m">R$49</td>
          <td class="col-g">R$55</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer class="bg-marrom text-white text-center py-3">
    © 2026 JKR
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $('#seletorTamanho').on('change', function () {
      let valor = $(this).val();
      $('.col-p, .col-m, .col-g').show();
      if (valor === 'P') {
        $('.col-m, .col-g').hide();
      } else if (valor === 'M') {
        $('.col-p, .col-g').hide();
      } else if (valor === 'G') {
        $('.col-p, .col-m').hide();
      }
    });
  </script>
  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
