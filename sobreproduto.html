<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKR Basic Cropped</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <div class="row">

            <div class="col-md-6">
                <img id="imagemProduto" src="images/croppedAzul.png" class="img-fluid rounded" alt="JKR Basic Cropped">
            </div>

            <div class="col-md-6">

                <h2>JKR Basic Cropped</h2>

                <h3 class="mb-3">R$ 49,90</h3>

                <p>
                    Cropped minimalista confeccionado em algodão premium.
                    Confortável para o dia a dia.
                </p>

                <h5>Cor</h5>

                <div class="d-flex gap-2 mb-4">

                    <button class="btn btn-warning" onclick="trocarCor('amarelo')">
                        Amarelo
                    </button>

                    <button class="btn btn-primary" onclick="trocarCor('azul')">
                        Azul
                    </button>

                    <button class="btn btn-light border" onclick="trocarCor('branco')">
                        Branco
                    </button>

                    <button class="btn btn-secondary" onclick="trocarCor('lilas')">
                        Lilás
                    </button>

                    <button class="btn btn-dark" onclick="trocarCor('marrom')">
                        Marrom
                    </button>

                    <button class="btn btn-dark" onclick="trocarCor('preto')">
                        Preto
                    </button>

                    <button class="btn btn-dark" onclick="trocarCor('rosa')">
                        Rosa
                    </button>

                </div>

                <h5>Tamanho</h5>

                <div class="d-flex gap-2 mb-4">

                    <button class="btn btn-outline-dark tamanho-btn" onclick="selecionarTamanho(this)">
                        PP
                    </button>

                    <button class="btn btn-outline-dark tamanho-btn" onclick="selecionarTamanho(this)">
                        P
                    </button>

                    <button class="btn btn-outline-dark tamanho-btn" onclick="selecionarTamanho(this)">
                        M
                    </button>

                    <button class="btn btn-outline-dark tamanho-btn" onclick="selecionarTamanho(this)">
                        G
                    </button>

                    <button class="btn btn-outline-dark tamanho-btn" onclick="selecionarTamanho(this)">
                        GG
                    </button>

                </div>

                <button class="btn btn-dark w-100 mb-2">
                    Adicionar ao Carrinho
                </button>

                <button class="btn btn-success w-100">
                    Comprar Agora
                </button>

            </div>

        </div>

    </div>

    <script>

        function trocarCor(cor) {

            const imagem = document.getElementById("imagemProduto");

            if (cor === "azul") {
                imagem.src = "images/croppedAzul.png";
            }

            else if (cor === "lilas") {
                imagem.src = "images/croppedLilas.png";
            }

            else if (cor === "amarelo") {
                imagem.src = "images/croppedAmarelo.png";
            }

            else if (cor === "branco") {
                imagem.src = "images/croppedBranco.png";
            }

            else if (cor === "marrom") {
                imagem.src = "images/croppedMarrom.png";
            }

            else if (cor === "preto") {
                imagem.src = "images/croppedPreto.png";
            }
            else if (cor === "rosa") {
                imagem.src = "images/croppedRosa.png";
            }

        }

        function selecionarTamanho(botao) {

            const botoes = document.querySelectorAll(".tamanho-btn");

            botoes.forEach(btn => {
                btn.classList.remove("btn-dark");
                btn.classList.add("btn-outline-dark");
            });

            botao.classList.remove("btn-outline-dark");
            botao.classList.add("btn-dark");

        }

    </script>

</body>

</html>
