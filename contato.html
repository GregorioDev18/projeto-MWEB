<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="bg-dark text-white text-center p-3">
  <h1>Contato</h1>
</header>

<main class="container py-5">

<form id="formContato">

  <input class="form-control mb-2" id="nome" placeholder="Nome">
  <input class="form-control mb-2" id="email" placeholder="Email">
  <input class="form-control mb-2" id="telefone" placeholder="Telefone">
  <input class="form-control mb-2" id="assunto" placeholder="Assunto">
  <textarea class="form-control mb-2" id="mensagem" placeholder="Mensagem"></textarea>

  <button class="btn btn-dark w-100">Enviar</button>

</form>

</main>

<footer class="bg-dark text-white text-center py-3">
  © 2026 JKR
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
