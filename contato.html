<body class="d-flex flex-column min-vh-100">

      <div class="container d-flex justify-content-between align-items-center">

        <!-- Logo mantida perfeitamente na esquerda -->
        <a class="navbar-brand fw-bold fs-4" href="index.html">JKR</a>

        <!-- Botão para celular -->
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu com links centralizados no espaço do meio -->
        <div class="collapse navbar-collapse justify-content-lg-center" id="menu">
          <!-- O 'mx-auto' garante a centralização absoluta em telas de computador -->
          <ul class="navbar-nav mx-auto gap-4 fw-medium text-center mt-3 mt-lg-0">

      <input class="form-control mb-2" id="assunto" placeholder="Assunto">
      <textarea class="form-control mb-2" id="mensagem" placeholder="Mensagem"></textarea>
      <button class="btn btn-dark w-100">Enviar</button>
    </form>

  <footer class="bg-marrom text-white text-center py-3">
